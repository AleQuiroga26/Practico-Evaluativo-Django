{% extends 'base.html' %}

{% block titulo %}Agregar Juego - Rincón del Vicio{% endblock %}

{% block contenido %}

<section class="crud-container">
    <h2>Agregar Nuevo Juego</h2>
    <form method="post" enctype="multipart/form-data" class="crud-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Agregar Juego</button>
        <a href="{% url 'tienda' %}" class="btn-cancelar">Cancelar</a>
    </form>
</section>

{% endblock %}

{% extends 'base.html' %}

{% block titulo %}Eliminar Juego - Rincón del Vicio{% endblock %}

{% block contenido %}

<section class="crud-container">
    <h2>¿Estás seguro de que querés eliminar este juego?</h2>
    <div class="eliminar-info">
        <p class="eliminar-titulo">{{ juego.titulo }}</p>
        <p class="eliminar-precio">USD ${{ juego.precio }}</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-eliminar">Sí, Eliminar</button>
        <a href="{% url 'tienda' %}" class="btn-cancelar">No, Cancelar</a>
    </form>
</section>

{% endblock %}
